# SIGDEP login theme — extends the default keycloak theme, only overrides
# what we need (CSS + login.ftl). Everything else (forgot password,
# update password, etc.) falls back to keycloak.v2 / keycloak so we
# don't have to maintain those templates.
parent=keycloak.v2

# Static resources the FreeMarker templates pull in via ${url.resourcesPath}.
# Listed here so Keycloak knows to serve them.
styles=css/sigdep.css

# Locale shown by default ; user can still switch via the language dropdown.
locales=fr,en
defaultLocale=fr

# Branding bits surfaced by the default templates.
kcLogoLink=https://sigdep.pnls.ci/
kcLogoIdP-keycloak=sigdep-logo
