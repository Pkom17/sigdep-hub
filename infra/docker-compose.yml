services:
  postgres:
    image: postgres:16
    container_name: sigdep-postgres
    environment:
      POSTGRES_DB: sigdep
      POSTGRES_USER: sigdep
      POSTGRES_PASSWORD: sigdep
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sigdep-keycloak
    # --import-realm bootstraps the realm from /opt/keycloak/data/import on
    # first start. On subsequent starts, if the realm already exists Keycloak
    # leaves it alone — use kcadm.sh for incremental tweaks, or
    # `docker-compose down -v` then up to re-bootstrap from the JSON.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Reverse-proxy mode: trust X-Forwarded-* from nginx and generate URLs
      # using the canonical localhost:9000 hostname the SPA sees.
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: http://localhost:9000
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_BACKCHANNEL: 'false'
    # Port 8180 is still exposed for direct admin access (kcadm.sh,
    # /auth/admin from the host browser). Day-to-day traffic should go
    # through nginx on :9000.
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-sigdep.json:/opt/keycloak/data/import/realm-sigdep.json:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: sigdep-nginx
    depends_on: [keycloak]
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      # Make host.docker.internal resolvable on Linux (already works on
      # Docker Desktop for Mac/Windows).
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
