version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sigdep-postgres
    environment:
      POSTGRES_DB: sigdep
      POSTGRES_USER: sigdep
      POSTGRES_PASSWORD: sigdep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sigdep-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

volumes:
  postgres_data:
