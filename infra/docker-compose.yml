services:
  postgres:
    image: postgres:16
    container_name: sigdep-postgres
    environment:
      POSTGRES_DB: sigdep
      POSTGRES_USER: sigdep
      POSTGRES_PASSWORD: sigdep
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sigdep-keycloak
    # --import-realm bootstraps the realm from /opt/keycloak/data/import on
    # first start. On subsequent starts, if the realm already exists Keycloak
    # leaves it alone — use kcadm.sh for incremental tweaks, or
    # `docker-compose down -v` then up to re-bootstrap from the JSON.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

volumes:
  postgres_data:
