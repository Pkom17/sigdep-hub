# SIGDEP-3 hub — production-leaning compose. Reproduces the dev topology
# (single nginx origin in front of Keycloak + the consolidated APIs) but
# with TLS, real DB credentials and Keycloak in production mode.
#
# DO NOT use this file as-is in production: it is a working skeleton that
# encodes the topology and config knobs. Before going live, replace every
# `change-me` placeholder, mount real TLS certs (Let's Encrypt or org PKI),
# put Postgres on managed storage, and pin image digests instead of tags.
#
# Usage (staging or local TLS verification):
#   docker compose -f docker-compose.prod.yml up

services:
  postgres:
    image: postgres:16
    container_name: sigdep-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-sigdep}
      POSTGRES_USER:     ${POSTGRES_USER:-sigdep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port exposed in prod — DB is reached over the compose network.

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sigdep-keycloak
    # `start` (not start-dev): runs the optimised, production-ready server.
    # Behind a TLS-terminating reverse proxy so HTTP is fine on the inside;
    # KC_PROXY_HEADERS makes Keycloak honour X-Forwarded-* from nginx.
    command: start --optimized --import-realm
    environment:
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME:          ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD:          ${KC_DB_PASSWORD:-change-me}
      KC_HOSTNAME:             ${KC_HOSTNAME:-https://sigdep.example.org}
      KC_HOSTNAME_STRICT:      'true'
      KC_PROXY_HEADERS:        xforwarded
      KC_HTTP_ENABLED:         'true'
    depends_on: [postgres]
    volumes:
      - ./keycloak/realm-sigdep.json:/opt/keycloak/data/import/realm-sigdep.json:ro
      # SIGDEP custom login theme.
      - ./keycloak/themes/sigdep:/opt/keycloak/themes/sigdep:ro

  console-api:
    # Replace with the actual published image (e.g. ghcr.io/itechciv/sigdep-console-api:<tag>).
    image: ${CONSOLE_API_IMAGE:-sigdep-console-api:latest}
    container_name: sigdep-console-api
    environment:
      SPRING_DATASOURCE_URL:           jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sigdep}
      SPRING_DATASOURCE_USERNAME:      ${POSTGRES_USER:-sigdep}
      SPRING_DATASOURCE_PASSWORD:      ${POSTGRES_PASSWORD:-change-me}
      KEYCLOAK_ISSUER_URI:             ${KC_HOSTNAME:-https://sigdep.example.org}/realms/sigdep
      KEYCLOAK_SERVER_URL:             http://keycloak:8080
      KEYCLOAK_ADMIN_CLIENT_SECRET:    ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me}
      APP_CORS_ALLOWED_ORIGINS:        ${PUBLIC_ORIGIN:-https://sigdep.example.org}
    depends_on: [postgres, keycloak]

  ingestion-api:
    image: ${INGESTION_API_IMAGE:-sigdep-ingestion-api:latest}
    container_name: sigdep-ingestion-api
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sigdep}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sigdep}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      KEYCLOAK_ISSUER_URI:        ${KC_HOSTNAME:-https://sigdep.example.org}/realms/sigdep
    depends_on: [postgres]

  console-web:
    # Sert le bundle Vite + sa propre config nginx (history fallback,
    # cache /assets/). Le nginx front (ci-dessous) fait le reverse-proxy.
    image: ${CONSOLE_WEB_IMAGE:-sigdep-console-web:latest}
    container_name: sigdep-console-web
    # Pas de port host exposé : le nginx front est seul à sortir sur
    # 443. console-web ne répond qu'au réseau interne du compose.

  nginx:
    image: nginx:1.27-alpine
    container_name: sigdep-nginx
    depends_on: [keycloak, console-api, ingestion-api, console-web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Monter ici un vrai certificat TLS. Pour staging, un certificat
      # mkcert fait l'affaire.
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
