# Dev reverse-proxy: a single origin (http://localhost:9000) that fronts the
# SPA, the console-api and Keycloak. Reproducing the prod topology in dev
# eliminates the cross-origin / CORS issues we hit on Firefox during the
# OIDC handshake, and keeps the URLs identical to what users will see in
# production.

worker_processes  auto;
events { worker_connections 1024; }

http {
    sendfile        on;
    keepalive_timeout 65;

    # WebSocket upgrade map (used for Vite HMR).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    upstream vite        { server host.docker.internal:5173; }
    upstream console_api { server host.docker.internal:8041; }
    upstream keycloak    { server keycloak:8080; }

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 50m;

        # Forward proxy info to upstreams so Keycloak and Spring see the
        # original host/scheme.
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # ---- Keycloak --------------------------------------------------
        # Realm endpoints, admin console, account console and static
        # resources all sit under these prefixes.
        location /realms/    { proxy_pass http://keycloak; }
        location /resources/ { proxy_pass http://keycloak; }
        location /js/        { proxy_pass http://keycloak; }
        location /admin/     { proxy_pass http://keycloak; }

        # ---- Console API ----------------------------------------------
        location /api/       { proxy_pass http://console_api; }
        location /actuator/  { proxy_pass http://console_api; }

        # ---- Vite dev server (SPA + HMR) ------------------------------
        # WebSocket upgrade is required so Vite can push HMR updates.
        # Note: nginx resets ALL inherited proxy_set_header values as soon
        # as one new proxy_set_header is declared inside a block, so we
        # restate Host and X-Forwarded-* here too.
        location / {
            proxy_pass http://vite;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout                 86400;
        }
    }
}
