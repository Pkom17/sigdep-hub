# Production reverse-proxy. Mirrors the dev config (same routes, same path
# prefixes) but adds TLS termination and serves the SPA from a built bundle
# instead of forwarding to Vite.

worker_processes  auto;
events { worker_connections 2048; }

http {
    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 50m;

    upstream console_api   { server console-api:8041; }
    upstream ingestion_api { server ingestion-api:8090; }
    upstream keycloak      { server keycloak:8080; }
    upstream console_web   { server console-web:80; }

    # Force HTTP → HTTPS at the edge.
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        # Buffers généreux : Keycloak peut envoyer des headers volumineux
        # (cookies de session + tokens JWT) qui font sauter les valeurs
        # par défaut et déclenchent des 502 « upstream sent too big header ».
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        # ---- Keycloak ---------------------------------------------------
        location /realms/    { proxy_pass http://keycloak; }
        location /resources/ { proxy_pass http://keycloak; }
        location /js/        { proxy_pass http://keycloak; }
        # /admin/ is the Keycloak admin console — gate it behind a separate
        # vhost or IP allowlist in real prod; left open here for simplicity.
        location /admin/     { proxy_pass http://keycloak; }

        # ---- Ingestion API (agents talk to this directly) --------------
        location /api/v1/sync/ { proxy_pass http://ingestion_api; }

        # ---- Console API ------------------------------------------------
        location /api/       { proxy_pass http://console_api; }
        location /actuator/  { proxy_pass http://console_api; }

        # ---- SPA (servie par le conteneur console-web) -----------------
        # Le conteneur console-web embarque le bundle Vite + sa propre
        # config nginx (history fallback, cache des /assets/). On le
        # traite ici comme n'importe quel upstream HTTP interne.
        location / {
            proxy_pass http://console_web;
        }
    }
}
