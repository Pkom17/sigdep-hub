# nginx config for the console-web container — serves the Vite build
# of the React SPA on port 80. The outer reverse-proxy (infra/nginx)
# routes /api, /realms etc. to the backend services ; this container
# only owns the static SPA bundle.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback — any unmatched route falls back to
    # index.html so the React router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets get the long cache they earn (Vite emits content
    # hashes in the filename, so they're effectively immutable).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the HTML shell — clients should always pick up the
    # latest bundle reference when we redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compress text-ish content. nginx alpine ships gzip but not brotli
    # by default ; gzip alone covers > 95% of clients.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
}
