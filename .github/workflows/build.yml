name: build

# Runs on every push / PR against master to validate that the hub
# compiles and the SPA builds. Does NOT publish images — that's the
# job of release.yml on tag events.

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [master]

jobs:
  java:
    name: Maven build (core-domain + ingestion-api + console-api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sigdep-hub
        uses: actions/checkout@v4

      - name: Checkout sigdep-contracts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sigdep-contracts
          ref: master
          path: ../sigdep-contracts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install sigdep-contracts to local M2
        working-directory: ../sigdep-contracts
        run: mvn -B -DskipTests install

      - name: Build hub (all modules)
        run: mvn -B -DskipTests package

      - name: Verify the fat jars
        run: |
          for jar in ingestion-api/target/ingestion-api-*.jar \
                     console-api/target/console-api-*.jar ; do
            test -s "$jar" || (echo "$jar missing" && exit 1)
            echo "OK : $jar"
          done

  web:
    name: Vite build (console-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console-web
    steps:
      - name: Checkout sigdep-hub
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: console-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify the bundle
        run: test -s dist/index.html
