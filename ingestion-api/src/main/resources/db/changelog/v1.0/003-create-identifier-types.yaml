databaseChangeLog:
  - changeSet:
      id: 003-create-identifier-types
      author: itechciv
      failOnError: true
      changes:
        - sql:
            sql: |
              CREATE TABLE core.identifier_types (
                id            SERIAL PRIMARY KEY,
                code          VARCHAR(50) UNIQUE NOT NULL,
                name          VARCHAR(255) NOT NULL,
                description   TEXT,
                format_regex  VARCHAR(255),
                is_active     BOOLEAN DEFAULT TRUE
              );
      rollback:
        - sql: DROP TABLE IF EXISTS core.identifier_types;
