databaseChangeLog:
  - changeSet:
      id: 007-create-dispensations
      author: itechciv
      failOnError: true
      changes:
        - sql:
            sql: |
              CREATE TABLE core.dispensations (
                id                     BIGSERIAL PRIMARY KEY,
                patient_id             BIGINT NOT NULL REFERENCES core.patients(id),
                site_id                BIGINT NOT NULL REFERENCES core.sites(id),
                source_uuid            UUID NOT NULL,
                dispensation_date      DATE NOT NULL,
                arv_regimen            VARCHAR(100),
                duration_days          INT,
                next_dispensation_date DATE,
                stockout_date          DATE,
                extra_data             JSONB,
                voided                 BOOLEAN DEFAULT FALSE,
                created_at             TIMESTAMP NOT NULL DEFAULT NOW(),
                updated_at             TIMESTAMP NOT NULL DEFAULT NOW(),
                UNIQUE (site_id, source_uuid)
              );
              CREATE INDEX idx_dispensations_patient ON core.dispensations(patient_id, dispensation_date DESC);
              CREATE INDEX idx_dispensations_regimen ON core.dispensations(arv_regimen);
      rollback:
        - sql: DROP TABLE IF EXISTS core.dispensations;
