spring:
  application:
    name: sigdep-console-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/sigdep}
    username: ${SPRING_DATASOURCE_USERNAME:sigdep}
    password: ${SPRING_DATASOURCE_PASSWORD:sigdep}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: core
  liquibase:
    enabled: false
  cache:
    type: caffeine
    # Tight TTL so dashboard / public-KPI consumers see fresh data within
    # ~30s of an ingest, without paying the full SQL cost on every reload.
    # Per-cache override is possible via `caffeine.spec` on a specific cache.
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=60s
  security:
    oauth2:
      resourceserver:
        jwt:
          # The issuer claim in the JWT is whatever Keycloak's KC_HOSTNAME
          # advertises, i.e. localhost:9000 in dev (via the nginx proxy).
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9000/realms/sigdep}

app:
  keycloak:
    # The admin client talks to Keycloak directly (server-to-server, no
    # proxy), so it stays on the container port 8180.
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:sigdep}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:sigdep-console-admin}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:console-admin-dev-secret-change-me}
  web:
    resources:
      static-locations: classpath:/static/

server:
  port: ${SERVER_PORT:8041}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
